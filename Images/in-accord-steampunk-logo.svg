<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">In-Accord Steampunk Controller Logo</title>
  <desc id="desc">An original steampunk-themed game-controller-style emblem with brass gears and the text In-Accord.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10151e"/>
      <stop offset="100%" stop-color="#1f2a38"/>
    </linearGradient>

    <radialGradient id="copperGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffcf8a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d37a"/>
      <stop offset="40%" stop-color="#bc8f3f"/>
      <stop offset="100%" stop-color="#7d5b24"/>
    </linearGradient>

    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7dde5"/>
      <stop offset="45%" stop-color="#8894a5"/>
      <stop offset="100%" stop-color="#4f5a69"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k2="1" k3="-1" result="inner"/>
      <feColorMatrix in="inner" type="matrix" values="1 0 0 0 0.5  0 1 0 0 0.35  0 0 1 0 0.08  0 0 0 1 0"/>
    </filter>

    <g id="gearSmall">
      <circle cx="0" cy="0" r="28" fill="url(#brass)" stroke="#5a3f17" stroke-width="4"/>
      <g fill="url(#brass)" stroke="#5a3f17" stroke-width="3">
        <rect x="-4" y="-42" width="8" height="12" rx="2"/>
        <rect x="-4" y="30" width="8" height="12" rx="2"/>
        <rect x="-42" y="-4" width="12" height="8" rx="2"/>
        <rect x="30" y="-4" width="12" height="8" rx="2"/>
      </g>
      <circle cx="0" cy="0" r="10" fill="#2a1d0a" stroke="#8f6a2c" stroke-width="3"/>
    </g>

    <g id="gearLarge">
      <circle cx="0" cy="0" r="48" fill="url(#brass)" stroke="#5a3f17" stroke-width="5"/>
      <g fill="url(#brass)" stroke="#5a3f17" stroke-width="3">
        <rect x="-5" y="-66" width="10" height="16" rx="2"/>
        <rect x="-5" y="50" width="10" height="16" rx="2"/>
        <rect x="-66" y="-5" width="16" height="10" rx="2"/>
        <rect x="50" y="-5" width="16" height="10" rx="2"/>
      </g>
      <circle cx="0" cy="0" r="16" fill="#2a1d0a" stroke="#8f6a2c" stroke-width="4"/>
    </g>
  </defs>

  <circle cx="700" cy="500" r="385" fill="url(#bgGrad)" stroke="#7d5b24" stroke-width="12"/>
  <ellipse cx="700" cy="500" rx="380" ry="340" fill="url(#copperGlow)"/>

  <!-- Controller-style crest (original silhouette) -->
  <g transform="translate(700 405)" filter="url(#softShadow)">
    <path d="M-430,35
             C-410,-90 -300,-130 -180,-122
             C-95,-116 -42,-84 0,-42
             C42,-84 95,-116 180,-122
             C300,-130 410,-90 430,35
             C446,136 390,198 312,202
             C236,206 204,154 172,106
             C142,60 108,42 0,42
             C-108,42 -142,60 -172,106
             C-204,154 -236,206 -312,202
             C-390,198 -446,136 -430,35 Z"
          fill="#121820" stroke="url(#steel)" stroke-width="14"/>

    <!-- Center plate -->
    <path d="M-110,-5 C-88,-35 -45,-52 0,-52 C45,-52 88,-35 110,-5 C94,18 55,34 0,34 C-55,34 -94,18 -110,-5 Z"
          fill="#1a2430" stroke="#7f8da0" stroke-width="6"/>

    <!-- Decorative rivets -->
    <g fill="#c9a25a" stroke="#5a3f17" stroke-width="2">
      <circle cx="-350" cy="40" r="7"/>
      <circle cx="-310" cy="130" r="7"/>
      <circle cx="350" cy="40" r="7"/>
      <circle cx="310" cy="130" r="7"/>
      <circle cx="-20" cy="-52" r="5"/>
      <circle cx="20" cy="-52" r="5"/>
    </g>

    <!-- Left control cluster -->
    <g transform="translate(-220,22)">
      <circle cx="0" cy="0" r="68" fill="#0f141c" stroke="#6d7786" stroke-width="8"/>
      <rect x="-10" y="-40" width="20" height="80" rx="6" fill="url(#brass)"/>
      <rect x="-40" y="-10" width="80" height="20" rx="6" fill="url(#brass)"/>
      <circle cx="0" cy="0" r="8" fill="#4e3513"/>
    </g>

    <!-- Right control cluster -->
    <g transform="translate(220,22)">
      <circle cx="0" cy="0" r="68" fill="#0f141c" stroke="#6d7786" stroke-width="8"/>
      <circle cx="-24" cy="-24" r="12" fill="url(#brass)"/>
      <circle cx="24" cy="-24" r="12" fill="url(#brass)"/>
      <circle cx="-24" cy="24" r="12" fill="url(#brass)"/>
      <circle cx="24" cy="24" r="12" fill="url(#brass)"/>
    </g>

    <!-- Analog-style dials -->
    <g transform="translate(-95,86)">
      <circle cx="0" cy="0" r="38" fill="#0f141c" stroke="#8792a4" stroke-width="7"/>
      <circle cx="0" cy="0" r="14" fill="url(#brass)"/>
    </g>
    <g transform="translate(95,86)">
      <circle cx="0" cy="0" r="38" fill="#0f141c" stroke="#8792a4" stroke-width="7"/>
      <circle cx="0" cy="0" r="14" fill="url(#brass)"/>
    </g>

    <!-- Copper pipes -->
    <path d="M-355,-2 C-330,-42 -280,-62 -236,-54" fill="none" stroke="#b87634" stroke-width="10" stroke-linecap="round"/>
    <path d="M355,-2 C330,-42 280,-62 236,-54" fill="none" stroke="#b87634" stroke-width="10" stroke-linecap="round"/>

    <!-- Gears -->
    <g transform="translate(-330,-22) rotate(12)"><use href="#gearLarge"/></g>
    <g transform="translate(330,-22) rotate(-12)"><use href="#gearLarge"/></g>
    <g transform="translate(-268,135) rotate(-22)"><use href="#gearSmall"/></g>
    <g transform="translate(268,135) rotate(22)"><use href="#gearSmall"/></g>

    <!-- Subtle inner glow -->
    <g filter="url(#innerGlow)">
      <path d="M-414,38
               C-396,-78 -293,-113 -180,-106
               C-101,-101 -54,-75 0,-22
               C54,-75 101,-101 180,-106
               C293,-113 396,-78 414,38"
            fill="none" stroke="#dba75f" stroke-opacity="0.2" stroke-width="10"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(700,770)">
    <text x="0" y="0" text-anchor="middle"
          font-family="Cinzel, Trajan Pro, Garamond, serif"
          font-size="96" letter-spacing="4"
          fill="url(#brass)" stroke="#5a3f17" stroke-width="2">
      In-Accord
    </text>
    <text x="0" y="44" text-anchor="middle"
          font-family="Segoe UI, Arial, sans-serif"
          font-size="22" letter-spacing="6"
          fill="#9fb0c6">
      Social Your Way!
    </text>
  </g>
</svg>
